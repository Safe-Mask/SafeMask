<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeMask - Cadastro</title>
    <link rel="stylesheet" href="../../css/login.css">
</head>

<body>
    <div class="auth-container">

        <div class="auth-card">
            <a href="../../../index.html" class="btn-voltar">← Voltar</a>
            
            <div class="auth-logo">
                <img src="../../images/safemask-logo.png" alt="SafeMask" class="logo-login">
            </div>

            <h1 class="auth-title">SafeMask</h1>

            <!-- ===== REGISTER FORM ===== -->
            <form id="registerForm" class="form active">
                <div class="input-group">
                    <label>Nome Completo</label>
                    <input type="text" id="cadastro-nome" placeholder="Seu nome" required>
                    <span id="nome-validation" class="validation-message"></span>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="cadastro-email" placeholder="seuemail@example.com" required>
                    <span id="email-validation" class="validation-message"></span>
                </div>

                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="cadastro-senha" placeholder="••••••••" required>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div id="strength-fill" class="strength-fill"></div>
                        </div>
                        <span id="strength-text"></span>
                    </div>
                    <span id="senha-validation" class="validation-message"></span>
                </div>

                <button class="auth-btn" id="btn-cadastrar" type="submit">Cadastrar</button>
            </form>

            <div class="auth-links">
                <p>Já tem conta? <a href="login.html">Faça login</a></p>
            </div>

        </div>
    </div>

    <script src="../../js/cadastro.js"></script>
</body>
</html>
