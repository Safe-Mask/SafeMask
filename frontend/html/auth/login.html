<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeMask - Login</title>
    <link rel="stylesheet" href="../../css/login.css">
</head>

<body>
    <div class="auth-container">

        <div class="auth-card">
            <a href="../../../index.html" class="btn-voltar">← Voltar</a>
            
            <div class="auth-logo">
                <img src="../../images/safemask-logo.png" alt="SafeMask" class="logo-login">
            </div>

            <h1 class="auth-title">SafeMask</h1>

            <!-- ===== LOGIN FORM ===== -->
            <form id="loginForm" class="form active">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="seuemail@example.com" required>
                    <span id="email-login-validation" class="validation-message"></span>
                </div>

                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="login-senha" placeholder="••••••••" required>
                    <span id="senha-login-validation" class="validation-message"></span>
                </div>

                <button class="auth-btn" id="btn-login" type="submit">Entrar</button>
            </form>

            <div class="auth-links">
                <a href="#" class="forgot-password">Esqueceu sua senha?</a>
                <p>Ainda não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
            </div>

        </div>
    </div>

    <script src="../../js/login.js"></script>
</body>
</html>
