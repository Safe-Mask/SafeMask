<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeMask - Redefinir senha</title>
    <link rel="stylesheet" href="../../css/login.css">
    <link rel="stylesheet" href="../../css/loading.css">
    <style>
        /* pequenas adaptações específicas para esta página */
        .feedback { text-align: center; color: #e74c3c; margin-top: 6px; }
    </style>
</head>

<body>
    <div class="auth-container">

        <div class="auth-card">
            <a href="../../../index.html" class="btn-voltar">← Voltar</a>
            
            <div class="auth-logo">
                <img src="../../images/safemask-logo.png" alt="SafeMask" class="logo-login">
            </div>

            <h1 class="auth-title">Redefinir senha</h1>

            <form id="resetPasswordForm" class="form active">
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" id="email" name="email" readonly>
                    <span id="email-reset-validation" class="validation-message"></span>
                </div>

                <div class="input-group">
                    <label>Nova senha</label>
                    <input type="password" id="senha" name="senha" placeholder="••••••••" required minlength="6">
                    <span id="senha-reset-validation" class="validation-message"></span>
                </div>

                <div class="input-group">
                    <label>Confirmar nova senha</label>
                    <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="••••••••" required minlength="6">
                    <span id="confirmar-reset-validation" class="validation-message"></span>
                </div>

                <div id="reset-feedback" class="auth-feedback"></div>

                <button class="auth-btn" type="submit">Alterar senha</button>
            </form>

            <div class="auth-links">
                <a href="login.html">Voltar ao login</a>
            </div>

        </div>
    </div>

    <!-- ===== LOADING SCREEN ===== -->
    <div class="loading-screen" id="loadingScreen"></div>

    <script src="../../js/loading.js"></script>
    <script src="../../js/auth/reset_password.js"></script>
</body>
</html>
